name: flowcore-ci

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FlowCore.slnx

      - name: Build
        run: dotnet build FlowCore.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test FlowCore.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Publish test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/*.trx'
